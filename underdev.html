<!DOCTYPE html>
<html>
<head>
<title>Kryvonix AI Assistant</title>

<style>
body{
background:#0b0f19;
color:white;
font-family:Arial;
text-align:center;
}

#chat{
width:70%;
height:400px;
border:1px solid #444;
margin:auto;
overflow:auto;
padding:10px;
}

input{
width:60%;
padding:10px;
margin-top:20px;
}

button{
padding:10px 20px;
background:#00f0ff;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Kryvonix AI Coding Assistant</h1>

<div id="chat"></div>

<input id="prompt" placeholder="Ask coding question">
<button onclick="askAI()">Send</button>

<script>

async function askAI(){

let prompt = document.getElementById("prompt").value

let response = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"You are a coding assistant."},
{role:"user",content:prompt}
]
})
})

let data = await response.json()

let reply = data.choices[0].message.content

document.getElementById("chat").innerHTML +=
"<p><b>You:</b> "+prompt+"</p>"

document.getElementById("chat").innerHTML +=
"<p><b>AI:</b> "+reply+"</p>"

}

</script>

</body>
</html>
